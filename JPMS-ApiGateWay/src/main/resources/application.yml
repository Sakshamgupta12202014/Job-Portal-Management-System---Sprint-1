server:
  port: 9090

spring:
  application:
    name: api-gateway

  cloud:
    gateway:
      discovery:
        locator:
          enabled: false
      routes:
        - id: auth-service
          uri: lb://auth-service
          predicates:
            - Path=/api/auth/**

        - id: job-service
          uri: lb://job-service
          predicates:
            - Path=/api/jobs/**

        - id: application-service
          uri: lb://application-service
          predicates:
            - Path=/api/applications/**

        - id: admin-service
          uri: lb://admin-service
          predicates:
            - Path=/api/admin/**

        - id: notification-service
          uri: lb://notification-service
          predicates:
            - Path=/api/notification/**

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true
    hostname: localhost
    ip-address: 127.0.0.1

jwt:
  secret: jobportal_super_secret_key_must_be_at_least_32_characters_long

management:
  endpoints:
    web:
      exposure:
        include: health, info
  endpoint:
    health:
      show-details: always