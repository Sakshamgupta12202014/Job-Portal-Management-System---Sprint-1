spring.application.name=notification-service
server.port=8085

# Eureka
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/

# RabbitMQ
spring.rabbitmq.host=localhost
spring.rabbitmq.port=5672
spring.rabbitmq.username=guest
spring.rabbitmq.password=guest

rabbitmq.exchange=jobportal.exchange
rabbitmq.queue=job.posted.queue
rabbitmq.routing-key=job.posted

# Email — Gmail SMTP
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${EMAIL}
spring.mail.password=${EMAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# Auth Service internal URL
auth.service.url=http://localhost:8081

# New queue for job applications
rabbitmq.applied.queue=job.applied.queue
rabbitmq.applied.routing-key=job.applied

# Zipkin config
management.tracing.sampling.probability=1.0
management.zipkin.tracing.endpoint=http://zipkin:9411/api/v2/spans

# Logging pattern (ADD THIS)
logging.pattern.level=%5p [${spring.application.name:},%X{traceId:-},%X{spanId:-}]