<div class="fixed top-5 right-5 z-50 flex flex-col gap-3 pointer-events-none">
  @for (toast of toastService.toasts(); track toast.id) {
    <div
      class="pointer-events-auto flex items-start gap-3 px-4 py-3 rounded-xl shadow-2xl
             border max-w-sm w-full animate-slide-down backdrop-blur-sm"
      [ngClass]="getClasses(toast)">
      <span class="text-lg flex-shrink-0">{{ getIcon(toast.type) }}</span>
      <p class="text-sm font-medium flex-1">{{ toast.message }}</p>
      <button (click)="toastService.dismiss(toast.id)"
              class="text-current opacity-60 hover:opacity-100 transition-opacity text-lg leading-none">
        &times;
      </button>
    </div>
  }
</div>
