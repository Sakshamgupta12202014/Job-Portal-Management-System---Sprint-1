<div class="min-h-[calc(100vh-4rem)] flex items-center justify-center px-4 py-12">
  <div class="w-full max-w-md animate-slide-up">
    <!-- Card -->
    <div class="card">
      <!-- Header -->
      <div class="text-center mb-8">
        <div class="w-14 h-14 bg-gradient-to-br from-primary-600 to-accent-500 rounded-2xl
                    flex items-center justify-center text-white text-2xl font-bold mx-auto mb-4">J</div>
        <h1 class="text-2xl font-bold text-gray-900 dark:text-white">Welcome back</h1>
        <p class="text-gray-500 dark:text-gray-400 text-sm mt-1">Sign in to your account</p>
      </div>

      <!-- Form -->
      <form [formGroup]="form" (ngSubmit)="submit()" class="space-y-5">
        <div>
          <label class="label">Email Address</label>
          <input formControlName="email" type="email" class="input"
                 [class.input-error]="hasError('email')"
                 placeholder="you@example.com"/>
          @if (hasError('email')) {
            <p class="error-msg">Valid email is required</p>
          }
        </div>

        <div>
          <div class="flex items-center justify-between mb-1.5">
            <label class="label mb-0">Password</label>
          </div>
          <input formControlName="password" type="password" class="input"
                 [class.input-error]="hasError('password')"
                 placeholder="••••••••"/>
          @if (hasError('password')) {
            <p class="error-msg">Password is required</p>
          }
        </div>

        @if (errorMsg()) {
          <div class="bg-red-500/10 border border-red-500/30 rounded-lg px-4 py-3 text-sm text-red-400">
            {{ errorMsg() }}
          </div>
        }

        <button type="submit" class="btn-primary w-full justify-center text-base h-11"
                [disabled]="loading()">
          @if (loading()) { <span>Signing in...</span> } @else { <span>Sign In</span> }
        </button>
      </form>

      <p class="text-center text-sm text-gray-500 dark:text-gray-400 mt-6">
        Don't have an account?
        <a routerLink="/register" class="text-primary-600 dark:text-primary-400 hover:underline font-bold ml-1">
          Register
        </a>
      </p>
    </div>
  </div>
</div>
