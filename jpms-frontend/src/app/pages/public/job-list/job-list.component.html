<div class="page-container">
  <div class="mb-8">
    <h1 class="page-title">Browse Jobs</h1>
    <p class="page-subtitle">Find your perfect opportunity</p>
  </div>

  <div class="flex flex-col lg:flex-row gap-8">
    <!-- Sidebar Filters -->
    <aside class="w-full lg:w-64 flex-shrink-0">
      <div class="card sticky top-20">
        <h3 class="font-bold text-gray-900 dark:text-white mb-4">Filters</h3>

        <div class="space-y-4">
          <div>
            <label class="label">Keyword</label>
            <input [(ngModel)]="filters.title" class="input" placeholder="Title, skill..."/>
          </div>
          <div>
            <label class="label">Location</label>
            <input [(ngModel)]="filters.location" class="input" placeholder="City, remote..."/>
          </div>
          <div>
            <label class="label">Job Type</label>
            <select [(ngModel)]="filters.jobType" class="input">
              <option value="">All Types</option>
              @for (type of jobTypes; track type) {
                <option [value]="type">{{ type }}</option>
              }
            </select>
          </div>
          <div>
            <label class="label">Min Experience (years)</label>
            <input [(ngModel)]="filters.experienceYears" type="number" class="input" placeholder="e.g. 2" min="0"/>
          </div>
          <button (click)="applyFilters()" class="btn-primary w-full justify-center">Apply Filters</button>
          <button (click)="resetFilters()" class="btn-secondary w-full justify-center">Reset</button>
        </div>
      </div>
    </aside>

    <!-- Job Grid -->
    <div class="flex-1">
      @if (loading()) {
        <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
          @for (_ of skeletons; track $index) {
            <div class="card animate-pulse h-48">
              <div class="h-4 bg-gray-200 dark:bg-gray-800 rounded w-3/4 mb-3"></div>
              <div class="h-3 bg-gray-200 dark:bg-gray-800 rounded w-1/2 mb-4"></div>
              <div class="space-y-2">
                <div class="h-3 bg-gray-200 dark:bg-gray-800 rounded"></div>
                <div class="h-3 bg-gray-200 dark:bg-gray-800 rounded w-2/3"></div>
              </div>
            </div>
          }
        </div>
      } @else if (jobs().length === 0) {
        <div class="card text-center py-16">
          <p class="text-4xl mb-4">🔍</p>
          <p class="text-gray-500 dark:text-gray-400">No jobs found. Try adjusting your filters.</p>
        </div>
      } @else {
        <div class="mb-3 text-sm text-gray-500 dark:text-gray-400">
          Showing <span class="text-gray-900 dark:text-white font-semibold">{{ response()?.totalElements }}</span> results
        </div>
        <div class="grid grid-cols-1 md:grid-cols-2 gap-5 animate-fade-in">
          @for (job of jobs(); track job.id) {
            <app-job-card [job]="job" />
          }
        </div>
        <app-pagination
          [currentPage]="currentPage()"
          [totalPages]="response()?.totalPages ?? 0"
          [totalElements]="response()?.totalElements ?? 0"
          (pageChange)="onPageChange($event)" />
      }
    </div>
  </div>
</div>
